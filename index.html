<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Voice & Paws</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { height: 100vh; background: #1a1a1a; user-select: none; -webkit-tap-highlight-color: transparent; }
    #overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      cursor: pointer; z-index: 10; padding: 24px;
    }
    .logo { margin-bottom: 28px; }
    .logo svg { display: block; }
    #play-icon {
      width: 72px; height: 72px;
      border: 1.5px solid #666; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 16px; transition: border-color .2s;
    }
    #play-icon::after {
      content: ''; display: block;
      width: 0; height: 0;
      border-left: 20px solid #666;
      border-top: 12px solid transparent;
      border-bottom: 12px solid transparent;
      margin-left: 5px;
    }
    #overlay p {
      color: #666; font-family: system-ui, sans-serif;
      font-size: 14px; text-align: center; line-height: 1.6;
    }
    #overlay p.name {
      font-size: 16px; font-weight: 500; color: #999;
      letter-spacing: .5px; margin-top: 12px;
    }
    #overlay p.hint { font-size: 13px; color: #555; margin-top: 6px; }
    .playing #overlay { display: none; }
    #player {
      position: fixed; bottom: 0; left: 0; right: 0;
      padding: 16px; display: none;
    }
    .playing #player { display: block; }
    #player audio { width: 100%; max-width: 100%; }
    #player p {
      color: #666; font-family: system-ui, sans-serif;
      font-size: 13px; text-align: center; margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <div id="overlay" onclick="play()">
    <div class="logo">
      <svg width="140" height="48" viewBox="0 0 140 48">
        <path d="M12 36c-2-4-3-9-3-14 0-4 2-6 4-7 2-1 5 0 6 3 1 3 1 7 0 11-2 4-4 7-7 7zm3-3c-1 1-3 1-4 0-1-1-1-4 0-7 1-4 3-6 5-6s2 3 2 6c0 3-1 6-3 7z" fill="#999"/>
        <path d="M22 38c-1-3-2-7-2-11 0-7 3-12 7-12s4 4 4 9c0 1 0 2-1 3-1 1-2 1-3 0 0-1 0-2 0-3 0-3-1-6-3-6s-2 3-2 6c0 3 0 6 1 8l-1 6z" fill="#999"/>
        <path d="M30 24c0-5 1-9 4-11 3-2 6 0 7 5 0 3 0 6-1 8-1 2-3 3-4 2-1-1-1-3 0-6 0-2 0-4-1-5s-2-1-3 1-1 5-1 9c0 3 0 5 1 7l-2 3v-13z" fill="#999"/>
        <path d="M41 38v-22h3l1 5c1-2 2-4 4-5 2-1 4 0 5 4 0 3 0 6-1 9-1 3-3 5-5 5-2 0-3-1-3-4 0-2 0-3 1-5 0-2 0-3-1-4s-2-1-3 0-1 3-1 6v11h-1z" fill="#999"/>
        <rect x="54" y="12" width="3" height="26" rx="1" fill="#777"/>
        <rect x="62" y="16" width="3" height="22" rx="1" fill="#999"/>
        <rect x="70" y="20" width="3" height="18" rx="1" fill="#777"/>
        <rect x="78" y="14" width="3" height="24" rx="1" fill="#999"/>
        <rect x="86" y="18" width="3" height="20" rx="1" fill="#777"/>
        <rect x="94" y="22" width="3" height="16" rx="1" fill="#999"/>
        <text x="108" y="36" font-family="system-ui,sans-serif" font-size="13" font-weight="500" fill="#999" letter-spacing=".5">their voice. their paws. forever.</text>
      </svg>
    </div>
    <p class="name">Voice &amp; Paws</p>
    <div id="play-icon"></div>
    <p class="hint">tap to listen</p>
  </div>
  <div id="player">
    <p>Voice &amp; Paws</p>
    <audio id="audio" src="sound.mp3" preload="auto" controls></audio>
  </div>
  <script>
    function play() {
      document.body.className = 'playing';
      var a = document.getElementById('audio');
      a.play().catch(function(e) { console.log(e); });
    }
  </script>
</body>
</html>

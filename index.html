<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Voice & Paws</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh; min-height: 100dvh;
      background: #1a1a1a;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 20px 16px;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    /* carousel */
    .carousel {
      position: relative;
      width: min(80vw, 340px);
      margin-bottom: 16px;
    }
    .viewport {
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 6px 32px rgba(0,0,0,0.5);
    }
    .track {
      display: flex; height: 100%;
      transition: transform .35s cubic-bezier(.25,.8,.25,1);
    }
    .slide {
      min-width: 100%; height: 100%;
    }
    .slide img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }
    .play-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none;
      transition: opacity .25s;
    }
    .play-circle {
      width: 68px; height: 68px;
      border-radius: 50%;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center;
    }
    .play-circle::after {
      content: '';
      width: 0; height: 0;
      border-left: 22px solid rgba(255,255,255,0.92);
      border-top: 13px solid transparent;
      border-bottom: 13px solid transparent;
      margin-left: 6px;
    }

    /* dots */
    .dots {
      display: flex; justify-content: center; gap: 8px;
      margin-bottom: 8px;
    }
    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #444;
      transition: background .25s, transform .25s;
    }
    .dot.active {
      background: #999;
      transform: scale(1.4);
    }

    .hint {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 15px; color: #777;
      text-align: center; margin-bottom: 24px;
    }
    .divider {
      width: 48px; height: 1px;
      background: #444;
      margin: 0 auto 18px;
    }
    .brand {
      font-family: 'Georgia', 'Times New Roman', 'Palatino', serif;
      font-size: 22px; font-weight: 400; font-style: italic;
      color: #bbb; letter-spacing: 2px;
      text-align: center; margin-bottom: 6px;
    }
    .slogan {
      font-family: 'Georgia', 'Times New Roman', 'Palatino', serif;
      font-size: 13px; font-style: italic;
      color: #777; letter-spacing: 1px;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="carousel" id="carousel">
    <div class="viewport" id="viewport">
      <div class="track" id="track">
        <!-- slides injected by JS -->
      </div>
    </div>
    <div class="play-overlay" id="playOverlay">
      <div class="play-circle"></div>
    </div>
  </div>

  <div class="dots" id="dots"></div>

  <p class="hint" id="hint">tap to hear them</p>
  <div class="divider"></div>
  <div class="brand">Voice &amp; Paws</div>
  <div class="slogan">their voice. their paws. forever.</div>

  <!-- ===== 替换为宠物声音 ===== -->
  <audio id="audio" src="sound.mp3" preload="auto"></audio>

  <script>
    // ===== 每个客户替换这里的照片列表（3~5张） =====
    var photos = [
      'photo-1.jpg',
      'photo-2.jpg',
      'photo-3.jpg'
    ];

    // ----- build slides & dots -----
    var track = document.getElementById('track');
    var dotsEl = document.getElementById('dots');
    var total = photos.length;

    photos.forEach(function(src, i) {
      var div = document.createElement('div');
      div.className = 'slide';
      var img = document.createElement('img');
      img.src = src;
      img.alt = 'photo ' + (i+1);
      img.draggable = false;
      div.appendChild(img);
      track.appendChild(div);

      var dot = document.createElement('span');
      dot.className = 'dot' + (i === 0 ? ' active' : '');
      dot.addEventListener('click', function() { goTo(i); });
      dotsEl.appendChild(dot);
    });

    // hide dots if only 1 photo
    if (total < 2) dotsEl.style.display = 'none';

    // ----- carousel logic -----
    var current = 0;

    function goTo(i) {
      if (i < 0 || i >= total || i === current) return;
      current = i;
      track.style.transform = 'translateX(-' + (current * 100) + '%)';
      var dots = dotsEl.querySelectorAll('.dot');
      dots.forEach(function(d, j) { d.classList.toggle('active', j === current); });
    }

    // ----- touch: swipe vs tap -----
    var startX = 0, startY = 0, startTime = 0;

    document.getElementById('viewport').addEventListener('touchstart', function(e) {
      startX = e.touches[0].clientX;
      startY = e.touches[0].clientY;
      startTime = Date.now();
    }, { passive: true });

    document.getElementById('viewport').addEventListener('touchend', function(e) {
      var dx = e.changedTouches[0].clientX - startX;
      var dy = e.changedTouches[0].clientY - startY;
      var dt = Date.now() - startTime;

      if (Math.abs(dx) > 40 && Math.abs(dx) > Math.abs(dy)) {
        // swipe
        if (dx < 0) goTo(current + 1);
        else goTo(current - 1);
      } else if (Math.abs(dx) < 20 && dt < 400) {
        // tap
        toggleAudio();
      }
    });

    // ----- audio -----
    var playing = false;
    var audio = document.getElementById('audio');
    var overlay = document.getElementById('playOverlay');
    var hint = document.getElementById('hint');

    function toggleAudio() {
      if (playing) {
        audio.pause();
        setState(false);
      } else {
        audio.play().then(function() {
          setState(true);
        }).catch(function(e) { console.log(e); });
      }
    }

    function setState(isPlaying) {
      playing = isPlaying;
      if (isPlaying) {
        overlay.style.opacity = '0';
        hint.textContent = 'tap to pause';
      } else {
        overlay.style.opacity = '1';
        hint.textContent = 'tap to hear them';
      }
    }

    audio.addEventListener('ended', function() { setState(false); });
    audio.addEventListener('pause', function() { setState(false); });
  </script>
</body>
</html>

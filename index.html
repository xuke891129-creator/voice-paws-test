<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Voice & Paws</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { height: 100vh; background: #1a1a1a; user-select: none; -webkit-tap-highlight-color: transparent; }
    #overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      cursor: pointer; z-index: 10; padding: 32px;
    }
    .bars {
      display: flex; align-items: flex-end; gap: 4px;
      height: 40px; margin-bottom: 32px;
    }
    .bars span {
      display: block; width: 4px; border-radius: 2px;
      background: #999;
    }
    .bars span:nth-child(1) { height: 16px; background: #777; }
    .bars span:nth-child(2) { height: 28px; }
    .bars span:nth-child(3) { height: 40px; }
    .bars span:nth-child(4) { height: 20px; background: #777; }
    .bars span:nth-child(5) { height: 32px; }
    .brand {
      font-family: system-ui, sans-serif;
      font-size: 26px; font-weight: 400;
      color: #aaa; letter-spacing: 1px;
      text-align: center; margin-bottom: 6px;
    }
    .slogan {
      font-family: system-ui, sans-serif;
      font-size: 12px; font-weight: 400;
      color: #555; letter-spacing: .5px;
      text-align: center; margin-bottom: 32px;
    }
    #play-icon {
      width: 64px; height: 64px;
      border: 1.5px solid #666; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 14px;
    }
    #play-icon::after {
      content: ''; display: block;
      width: 0; height: 0;
      border-left: 18px solid #666;
      border-top: 10px solid transparent;
      border-bottom: 10px solid transparent;
      margin-left: 5px;
    }
    .hint {
      font-family: system-ui, sans-serif;
      font-size: 13px; color: #555;
      text-align: center;
    }
    .playing #overlay { display: none; }
    #player {
      position: fixed; bottom: 0; left: 0; right: 0;
      padding: 16px; display: none;
    }
    .playing #player { display: block; }
    #player audio { width: 100%; max-width: 100%; }
    #player p {
      color: #666; font-family: system-ui, sans-serif;
      font-size: 13px; text-align: center; margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <div id="overlay" onclick="play()">
    <div class="bars">
      <span></span><span></span><span></span><span></span><span></span>
    </div>
    <div class="brand">Voice &amp; Paws</div>
    <div class="slogan">their voice. their paws. forever.</div>
    <div id="play-icon"></div>
    <div class="hint">tap to listen</div>
  </div>
  <div id="player">
    <p>Voice &amp; Paws</p>
    <audio id="audio" src="sound.mp3" preload="auto" controls></audio>
  </div>
  <script>
    function play() {
      document.body.className = 'playing';
      var a = document.getElementById('audio');
      a.play().catch(function(e) { console.log(e); });
    }
  </script>
</body>
</html>
